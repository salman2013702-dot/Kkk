  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laws Sin 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- MONACO EDITOR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

<style>

body{
  margin:0;
  background:#0d0f14;
  font-family:Orbitron, Arial;
  color:white;
}

/* NAVBAR */
#navbar{
  height:60px;
  background:#0a0c10;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid #1f2330;
}

#logo{
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,#00f0ff,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: glow 4s linear infinite;
}

@keyframes glow{
  0%{filter:hue-rotate(0deg);}
  100%{filter:hue-rotate(360deg);}
}

#nav-right{
  display:flex;
  align-items:center;
  gap:10px;
}

#avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  border:2px solid cyan;
}

#signin{
  background:linear-gradient(90deg,#00f0ff,#ff00c8);
  border:none;
  padding:8px 15px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* MAIN */
#main{
  display:flex;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
#sidebar{
  width:200px;
  background:#0a0c10;
  border-right:1px solid #1f2330;
  padding:10px;
}

#newProject{
  width:100%;
  padding:10px;
  background:#00f0ff;
  border:none;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:10px;
}

.project{
  padding:8px;
  background:#151922;
  margin-bottom:5px;
  cursor:pointer;
}

/* EDITOR */
#editor{
  width:50%;
  height:100%;
}

/* PREVIEW */
#preview{
  width:50%;
  border:none;
  background:white;
}

</style>
</head>
<body>

<div id="navbar">

<div id="logo">Laws Sin 2</div>

<div id="nav-right">

<img src="https://i.imgur.com/HeIi0wU.png" id="avatar">

<button id="signin">Sign In / Up</button>

</div>

</div>

<div id="main">

<div id="sidebar">

<button id="newProject">+ New Project</button>

<div id="projects"></div>

</div>

<div id="editor"></div>

<iframe id="preview"></iframe>

</div>

<script>

let editor;
let currentProject = "";

/* INIT MONACO */
require.config({
  paths:{
    vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs"
  }
});

require(["vs/editor/editor.main"], function(){

editor = monaco.editor.create(document.getElementById("editor"),{

value:`<h1>Laws Sin 2</h1>
<p>Start coding...</p>`,

language:"html",

theme:"vs-dark",

automaticLayout:true

});

editor.onDidChangeModelContent(saveProject);

});

/* NEW PROJECT */
document.getElementById("newProject").onclick=function(){

let name=prompt("Project name:");

if(!name)return;

currentProject=name;

editor.setValue("<h1>"+name+"</h1>");

saveProject();

loadProjects();

};

/* SAVE */
function saveProject(){

if(!currentProject)return;

localStorage.setItem(
"lawsin2_"+currentProject,
editor.getValue()
);

updatePreview();

}

/* LOAD PROJECTS */
function loadProjects(){

let container=document.getElementById("projects");

container.innerHTML="";

for(let key in localStorage){

if(key.startsWith("lawsin2_")){

let name=key.replace("lawsin2_","");

let div=document.createElement("div");

div.className="project";

div.textContent=name;

div.onclick=function(){

currentProject=name;

editor.setValue(localStorage.getItem(key));

};

container.appendChild(div);

}

}

}

/* PREVIEW */
function updatePreview(){

document.getElementById("preview").srcdoc=
editor.getValue();

}

/* SIGN IN BUTTON */
document.getElementById("signin").onclick=function(){

alert("Sign In / Sign Up coming soon");

};

setInterval(updatePreview,1000);

loadProjects();

</script>

</body>
</html>
    
  </body>
  
</html>
